  </g>
  <!-- Wordmark -->
  <text x="256" y="310" font-family="'Inter', system-ui, -apple-system, sans-serif" font-weight="800" font-size="64" text-anchor="middle" fill="#fff" letter-spacing="6">NEXUS</text>
  <!-- Tagline -->
  <text x="256" y="350" font-family="'Inter', system-ui, -apple-system, sans-serif" font-weight="400" font-size="20" text-anchor="middle" fill="#94a3b8" letter-spacing="3">FREELANCE OS</text>
  <!-- Social proof accent -->
